        </button>
      </form>

    </div>

    <!-- Infos -->

      <h2>Informations</h2>

      <p><i class="fa-solid fa-envelope"></i> mail@gmail.com</p>
      <p><i class="fa-solid fa-phone"></i> 06 00 00 00 00</p>
